version: '3.8'

# ─────────────────────────────────────────
# Cricket Management System - Docker Compose
# ─────────────────────────────────────────

networks:
  cricket-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  minio_data:

services:

  # ──────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: cricket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cricket_db
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d cricket_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cricket-net

  mongodb:
    image: mongo:4.4
    container_name: cricket-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: cricket_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cricket-net

  redis:
    image: redis:7-alpine
    container_name: cricket-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cricket-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cricket-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
      RABBITMQ_DEFAULT_VHOST: cricket_vhost
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cricket-net

  minio:
    image: minio/minio:latest
    container_name: cricket-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cricket-net

  # ──────────────────────────────────────
  # MICROSERVICES
  # ──────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: cricket-auth
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: cricket-user
    restart: unless-stopped
    env_file:
      - ./services/user-service/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  team-service:
    build:
      context: ./services/team-service
      dockerfile: Dockerfile
    container_name: cricket-team
    restart: unless-stopped
    env_file:
      - ./services/team-service/.env
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  match-service:
    build:
      context: ./services/match-service
      dockerfile: Dockerfile
    container_name: cricket-match
    restart: unless-stopped
    env_file:
      - ./services/match-service/.env
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  performance-service:
    build:
      context: ./services/performance-service
      dockerfile: Dockerfile
    container_name: cricket-performance
    restart: unless-stopped
    env_file:
      - ./services/performance-service/.env
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  financial-service:
    build:
      context: ./services/financial-service
      dockerfile: Dockerfile
    container_name: cricket-financial
    restart: unless-stopped
    env_file:
      - ./services/financial-service/.env
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: cricket-notification
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  file-service:
    build:
      context: ./services/file-service
      dockerfile: Dockerfile
    container_name: cricket-file
    restart: unless-stopped
    env_file:
      - ./services/file-service/.env
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  attendance-service:
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    container_name: cricket-attendance
    restart: unless-stopped
    env_file:
      - ./services/attendance-service/.env
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: cricket-gateway
    restart: unless-stopped
    env_file:
      - ./api-gateway/.env
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - user-service
      - team-service
      - match-service
      - performance-service
      - financial-service
      - notification-service
      - file-service
      - attendance-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cricket-net
