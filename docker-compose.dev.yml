version: '3.8'

# ─────────────────────────────────────────
# Development overrides — hot reload via nodemon
# ─────────────────────────────────────────

services:
  auth-service:
    build:
      target: development
    command: npm run dev
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  user-service:
    build:
      target: development
    command: npm run dev
    volumes:
      - ./services/user-service:/app
      - /app/node_modules

  team-service:
